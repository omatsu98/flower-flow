services:
  - type: web
    name: flower-flow
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        value: gpt-5.4-mini
    disk:
      name: flower-flow-data
      mountPath: /var/data
      sizeGB: 1
